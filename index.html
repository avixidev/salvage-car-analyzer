<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salvage Car Analyzer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Salvage Car Analyzer</h1>
        <p class="subtitle">Estimate profit and ROI for a salvage vehicle deal</p>

        <div class="form-card">
            <label for="vin">VIN</label>
            <div class="vin-row">
                <input type="text" id="vin" placeholder="Enter VIN">
                <button type="button" class="vin-btn" onclick="decodeVIN()">Decode VIN</button>
            </div>
            <label for="carModel">Car Model</label>
            <input type="text" id="carModel" placeholder="e.g. Lexus IS350">

            <label for="year">Year</label>
            <input type="number" id="year" placeholder="e.g. 2021">

            <label for="mileage">Mileage</label>
            <input type="number" id="mileage" placeholder="e.g. 42000">

            <label for="damageType">Damage Type</label>
            <select id="damageType" onchange="estimateRepair()">
                <option value="">Select damage type</option>
                <option value="Front End">Front End</option>
                <option value="Rear End">Rear End</option>
                <option value="Side Damage">Side Damage</option>
                <option value="Hail">Hail</option>
                <option value="Flood">Flood</option>
                <option value="Mechanical">Mechanical</option>
                <option value="Biohazard">Biohazard</option>
                <option value="Minor Dent/Scratches">Minor Dent/Scratches</option>
            </select>

            <label for="auctionPrice">Auction Price ($)</label>
            <input type="number" id="auctionPrice" placeholder="e.g. 14000">

            <label for="repairCost">Repair Cost ($)</label>
            <input type="number" id="repairCost" placeholder="e.g. 6000">

            <label for="marketPrice">Market Price ($)</label>
            <input type="number" id="marketPrice" placeholder="e.g. 27000" oninput="estimateRepair()">

            <label for="fees">Fees + Shipping ($)</label>
            <input type="number" id="fees" placeholder="e.g. 2000">

            <label for="desiredProfit">Desired Profit ($)</label>
            <input type="number" id="desiredProfit" placeholder="e.g. 4000">

            <button onclick="calculate()">Analyze Deal</button>
        </div>

        <div class="ai-card">
            <h2>Approximate Repair Estimate by AI</h2>

            <label for="damagePhotos">Upload Damage Photos</label>
            <input type="file" id="damagePhotos" multiple accept="image/*">

            <label for="damageNotes">Damage Notes</label>
            <textarea
                id="damageNotes"
                placeholder="Example: front bumper cracked, left fender bent, headlight broken"
            ></textarea>

            <button type="button" onclick="estimateRepairWithAI()">Estimate with AI</button>

            <div id="aiEstimateResult">
                AI estimate will appear here.
            </div>
        </div>

        <div class="result-card" id="result">
            Your results will appear here.
        </div>

        <div class="analytics-grid">
            <div class="analytics-card">
                <h3>Total Deals</h3>
                <p id="totalDeals">0</p>
            </div>

            <div class="analytics-card">
                <h3>Average ROI</h3>
                <p id="averageROI">0%</p>
            </div>

            <div class="analytics-card">
                <h3>Best Profit</h3>
                <p id="bestProfit">$0</p>
            </div>

            <div class="analytics-card">
                <h3>Worst Profit</h3>
                <p id="worstProfit">$0</p>
            </div>
        </div>

        <div class="chart-card">
            <h2>Profit by Deal</h2>
            <canvas id="profitChart"></canvas>
        </div>

        <div class="history-card">
            <div class="history-header">
                <h2>Analyzed Deals</h2>
                <button class="clear-btn" onclick="clearHistory()">Clear History</button>
            </div>

            <div class="sort-controls">
                <button class="sort-btn" onclick="sortDealsByROI()">Sort by ROI</button>
                <button class="sort-btn" onclick="sortDealsByProfit()">Sort by Profit</button>
            </div>

            <table id="historyTable">
                <thead>
                    <tr>
                        <th>Car</th>
                        <th>ROI</th>
                        <th>Profit</th>
                        <th>Risk</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody>
                </tbody>
            </table>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="script.js"></script>
</body>
</html>
